---
- name: living room
  lights:
    - light.corner_lamp
    - light.standing_lamp
    - light.table_lamp
  min_brightness: 70
  prefer_rgb_color: true
  detect_non_ha_changes: true
  interval: 30

- name: bedroom
  lights:
    - light.bedroom_lights
  sleep_brightness: 20
  min_brightness: 70
  prefer_rgb_color: true
  detect_non_ha_changes: true
  interval: 30
  sunrise_time: "07:00:00"

- name: hallway
  lights:
    - light.hallway_lights
  min_brightness: 70
  prefer_rgb_color: true
  detect_non_ha_changes: true
  interval: 30
  sleep_brightness: 3

- name: cabinet
  lights:
    - light.cabinet_lights
  min_brightness: 70
  prefer_rgb_color: true
  detect_non_ha_changes: true
  interval: 30
  sleep_brightness: 3

- name: java lamp
  lights:
    - light.java_map
  min_brightness: 50
  max_brightness: 70
  sleep_brightness: 20
  prefer_rgb_color: true
  detect_non_ha_changes: true
  interval: 30
