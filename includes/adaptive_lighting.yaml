---
- name: living room
  lights:
    - light.corner_lamp
    - light.standing_lamp
  min_brightness: 70
  prefer_rgb_color: true
  detect_non_ha_changes: true
  interval: 30

- name: bedroom
  lights:
    - light.bedroom_lights
  sleep_brightness: 20
  min_brightness: 70
  prefer_rgb_color: true
  detect_non_ha_changes: true
  interval: 30
  sunrise_time: "07:30:00"

- name: hallway
  lights:
    - light.hallway_lights
  min_brightness: 70
  prefer_rgb_color: true
  detect_non_ha_changes: true
  interval: 30

- name: bathroom
  lights:
    - light.bathroom_lights
  min_brightness: 70
  prefer_rgb_color: false
  detect_non_ha_changes: true
  interval: 30
