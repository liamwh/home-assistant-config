---
- alias: "Light: Turn on bathroom lights when door opens"
  description: ""
  trigger:
    - type: opened
      platform: device
      device_id: f71438264bf00faabf9df480352d3b25
      entity_id: binary_sensor.openclose_bathroom_door
      domain: binary_sensor
  action:
    - choose:
        - conditions:
            - condition: state
              entity_id: binary_sensor.workday_sensor
              state: "off"
          sequence:
            - scene: scene.bathroom_energize
        - conditions:
            - condition: state
              entity_id: binary_sensor.workday_sensor
              state: "on"
            - condition: time
              after: "19:30:00"
          sequence:
            - scene: scene.bathroom_relax
        - conditions:
            - condition: state
              entity_id: binary_sensor.workday_sensor
              state: "on"
            - condition: time
              after: "22:30:00"
          sequence:
            - scene: scene.bathroom_nightlight
      default:
        - scene: scene.bathroom_energize
  mode: single

- alias: "Light: toggle bathroom (based on presence)"
  trigger:
    platform: state
    entity_id: binary_sensor.activity_in_bathroom
  condition: "{{ not is_state('light.bathroom_lights', trigger.to_state.state) }}"
  action:
    service: light.turn_{{ trigger.to_state.state }}
    data:
      entity_id: light.bathroom_lights
      transition: 1

- alias: "Light: toggle kitchen (based on presence)"
  trigger:
    platform: state
    entity_id: binary_sensor.activity_in_kitchen
  action:
    - service: light.turn_{{ trigger.to_state.state }}
      data:
        entity_id: light.kitchen_lights
        transition: 1

- alias: "Light: toggle hallway (based on presence)"
  trigger:
